{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Library System</title>

<link rel="stylesheet"
href="{% static 'css/style.css' %}">

</head>

<body>

<nav>

<a href="/">Home</a>

<a href="/add/">Add Book</a>

{% if user.is_authenticated %}

<form
action="{% url 'logout' %}"
method="POST"
style="display:inline;">

{% csrf_token %}

<button type="submit">

Logout

</button>

</form>

{% else %}

<a href="{% url 'login' %}">

Login

</a>

{% endif %}

</nav>

<hr>

{% block content %}
{% endblock %}

</body>

</html>
